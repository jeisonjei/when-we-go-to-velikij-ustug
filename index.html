<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      html * {
        margin: 0;
        padding: 0;
      }

      .content {
        background-image: linear-gradient(#83bdff, #ffa620);
        height: 100vh;
        padding: 20px 30px;
      }

      .header {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }

      .title {
        display: flex;
        flex-direction: row;
        gap:10px
      }

      .subtitle {
        display: flex;
        gap:10px;

      }

      .header-content {
        font-family: Cambria, Cochin, Georgia, Times, "Times New Roman", serif;
        font-size: 36px;
      }

      .header-time {
        font-family: Cambria, Cochin, Georgia, Times, "Times New Roman", serif;
        font-size: 36px;

        display: flex;
        flex-direction: column;
      }

      @media (min-width: 420px) {
        .header-time {
            flex-direction: row;
            gap:10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="content">
      <div class="header">
        <div class="title">
          <div class="header-content">До поездки осталось</div>
          <div class="header-time">
            <div class="hours"></div>
            <div class="minutes"></div>
            <div class="seconds"></div>
          </div>
        </div>
        <div class="subtitle">
          <div>Отправляемся</div>
        </div>
      </div>
    </div>
    <script>
      var headerTimeEl = document.querySelector(".header-time");
      var remainingTimeHoursElement = document.querySelector('.header-time .hours');
      var remainingTimeMinutesElement = document.querySelector('.header-time .minutes');
      var remainingTimeSecondsElement = document.querySelector('.header-time .seconds');
      var departureTime = new Date();
      departureTime.setFullYear(2026, 6, 31);
      departureTime.setHours(17, 0, 0, 0);
      var subtitleElement = document.querySelector(".subtitle");
      var dateToGoElement = document.createElement("div");

      dateToGoElement.innerHTML = `<p>${departureTime.toLocaleDateString()} в ${departureTime.toLocaleTimeString()}</p>`;
      subtitleElement.append(dateToGoElement);

      let diff = 0;

      setInterval(() => {
        diff = diff + 1000;
        let remaining = departureTime - Date.now();

        if (remaining < 0) remaining = 0;

        let h = Math.floor(remaining / 3600000);
        let m = Math.floor((remaining % 3600000) / 60000);
        let s = Math.floor((remaining % 60000) / 1000);
        
        remainingTimeHoursElement.innerHTML = `${h} часов`;
        remainingTimeMinutesElement.innerHTML = `${String(m).padStart(2, "0")} минут`;
        remainingTimeSecondsElement.innerHTML = `${String(s).padStart(2, "0")} секунд`;
      }, 1000);
    </script>
  </body>
</html>
