<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="page">
      <div class="header">
        <div class="title">
          <div class="header-content">До поездки осталось</div>
          <div class="header-time">
            <div class="hours"></div>
            <div class="minutes"></div>
            <div class="seconds"></div>
          </div>
        </div>
        <div class="subtitle">
          <div>Отправляемся</div>
        </div>
        <div class="content">
          <div class="tasks-area">
            <div class="tasks-area__title">Что ещё нужно сделать</div>
            <div class="actions">
              <div class="action">
                <input
                  type="text"
                  name="add-task-field"
                  id="add-task-field"
                  placeholder="Написать..."
                />
                <button id="add-task" class="btn add">Добавить</button>
              </div>
            </div>
            <div class="tasks"></div>
          </div>
        </div>
      </div>
    </div>
    <script src="storageService.js"></script>
    <script src="main.js"></script>
  </body>
</html>
